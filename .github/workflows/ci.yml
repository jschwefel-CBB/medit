name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (SwiftPM)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode (need Swift tools >= 6.0)
        run: |
          # The macos-14 image ships several Xcodes; the default symlink can be
          # an older one (Swift 5.10), but the package requires tools 6.0. Pick
          # the highest-versioned Xcode that's actually installed.
          newest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$newest" ]; then newest=/Applications/Xcode.app; fi
          echo "Selecting $newest"
          sudo xcode-select -switch "$newest"

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v
